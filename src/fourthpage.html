<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fourth page</title>
    <link rel="stylesheet" href="/src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>


    <!-- div containing the first flex -->
    <div class="flex justify-center gap-20 h-[35vh] pt-3.5 max-sm:justify-center max-sm:gap-3.5 max-sm:h-[35vh]">
         <div>
            <h1 class="text-3xl font-bold mt-5">Stay connected on the trial</h1>
            <p>share your live location to keep your hikes safe and connected</p>
            <button class="bg-green-400 rounded-3xl p-2">learn more</button>
        </div>

        <img src="/src/images/upperphone.jpeg" alt="">
    </div>

    <!-- div for the second flex -->
     <div class="flex justify-center gap-20 mt-52  h-[35vh] max-sm:justify-center max-sm:gap-3.5 max-sm:h-[35vh]">
        <div class="bg-gray-200 w-[30vw] flex justify-center">
        <img src="/src/images/lowerphone.jpeg" alt="">
        </div>

         <div>
            <h2 class="text-3xl font-bold mt-7 max-sm:text-3xl max-sm:font-bold max-sm:mt-5 ">Share your Adventures <br> with your community</h2>
            <button class="bg-green-400 rounded-3xl p-2">learn more</button>
        </div>
     </div>


     <!-- div of small icons -->
      <div class="rounded-2xl border bg-white w-[20vw] m-auto border-black py-1.5 absolute top-[21vh] left-[45vw] max-sm:top-[25vh] max-sm:left-[30vw] max-sm:w-[40vw]">
        <div class="flex justify-center gap-5 max-sm:gap-3">
            <img src="/src/images/icon2.jpeg" alt="" class="w-[8vw] max-sm:w-[8vw]">
            <p class="mt-7 max-sm:mt-3 max-sm:text-sm">pandu penda wijaya</p>
            <p class="mt-7 max-sm:mt-3 max-sm:text-sm">1.2km</p>
        </div>

          <div class="flex justify-center gap-5 max-sm:gap-3">
            <img src="/src/images/icon1.jpeg" alt="" class="w-[5vw]">
            <p class="mt-7 max-sm:mt-3 max-sm:text-sm">maria prasetya</p>
            <p class="mt-7 max-sm:mt-3 max-sm:text-sm">1.8km</p>
        </div>

        <!-- div for those two boxes -->
         <div class="flex justify-center gap-5 rounded-2xl max-sm:mt-2.5 ">
            <div class="bg-gray-200 rounded-2xl p-2.5">
                <i class="fa-regular fa-clock ml-3"></i>
                <p class="max-sm:text-sm">04:32:16</p>
                <p class="max-sm:text-sm">duration</p>
            </div>

             <div class="bg-gray-200 rounded-2xl p-2.5">
                <i class="fa-solid fa-s ml-3"></i>
                <p class="max-sm:text-sm">120.4KM</p>
                <p class="max-sm:text-sm">disatnce</p>
            </div>
         </div>

         <button class="w-[13vw] ml-12 mt-2.5 border border-pink-400 text-pink-400 rounded-3xl max-sm:w-[18vw] max-sm:text-sm max-sm:ml-12 max-sm:mt-2.5">stop share</button>
      </div>
</body>
</html>
